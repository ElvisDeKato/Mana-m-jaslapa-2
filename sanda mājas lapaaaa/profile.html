<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="profile"></div>

<script>
const m = JSON.parse(localStorage.getItem("selectedMusician"));

document.getElementById("profile").innerHTML = `
  <div style="text-align:center;padding:40px">
    <img src="${m.photo}" style="width:300px">
    <h1>${m.name}</h1>
    <p>${m.genre}</p>
    <p>${m.bio}</p>
    <p>${m.video}</p>
    <p>${m.photo}</p>
    ${m.embed ? `<iframe src="${m.embed}" width="300"></iframe>`:""}
  </div>
`;
</script>

</body>
</html>
